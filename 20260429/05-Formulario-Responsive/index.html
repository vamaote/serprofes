<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect With Us - Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>Connect With Us</h2>
        <p>¿Hablamos de tu próximo proyecto con IA?</p>
        <form>
            <div class="input-group">
                <label>Nombre</label>
                <input type="text" placeholder="Ej. Jorge">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="hola@ia.com">
            </div>
            <button type="submit" class="btn-enviar">Enviar Mensaje</button>
        </form>
    </div>
</body>
</html>
