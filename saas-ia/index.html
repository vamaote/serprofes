<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi IA SaaS - Panel de Control</title>
    <title>Imagen de fondo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class= "logo-area">
                <h2>IA Master</h2>
            </div>
            <nav class="menu-lateral">
                <button>+ Nuevo Chat</button>
                <div class="historial">
                    <p>Historia reciente ...</p>
                    <ul>
                        <li>¿Como hacer dieta?</li>
                        <li>Receta de pizza</li>
                    </ul>
                </div>
            </nav>
            <div class="perfil">
                <span>Usuario Pro</span>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <h3>Conversacion Actual</h3>
            </header>

            <section class="mensajes-container">
                <div class="mensaje-ia">¡Hola! Soy tu asistente de inteligencia artificial. ¿En qué puedo ayudarte hoy?</div>
            <section>

                <footer class="input-area">
                    <form class="chat-form">
                        <input type="text" placeholder="Escribe tu mensaje aquí..." />
                        <button type="submit">Enviar</button>
                    </form>
                </footer>
            </section>
        </main>
     <div>
<body>
</html>
